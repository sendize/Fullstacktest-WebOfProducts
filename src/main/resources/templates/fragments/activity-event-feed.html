<div id="feedContent" class="activity-content-shell card activity-shell" th:fragment="activityFeed">
    <div class="activity-head">
        <div>
            <p class="eyebrow">Activity feed</p>
            <h2 class="section-title">Recent catalog events</h2>
        </div>
        <div class="metrics-badge quiet">
            <wa-icon name="clock-rotate-left"></wa-icon>
            <span>Newest first</span>
        </div>
    </div>

    <div class="activity-list" id="eventStreamFeeed">
        <!--         th:if="${recentEvents != null and !#lists.isEmpty(recentEvents)}"-->

        <article class="activity-item"
                 th:each="event : ${recentEvents}"
                 th:classappend="${event.severity != null ? ' severity-' + event.severity : ''}">
            <div class="activity-rail">
                <span class="activity-dot"></span>
            </div>
            <div class="activity-content">
                <div class="activity-topline">
                    <div class="activity-tags">
                        <span class="activity-pill"
                              th:text="${event.eventType != null ? event.eventType : 'EVENT'}">EVENT</span>
                        <span class="activity-pill muted"
                              th:text="${event.severity != null ? event.severity : 'info'}">info</span>
                    </div>
                    <span class="activity-time"
                          th:text="${event.createdAtLabel != null ? event.createdAtLabel : 'Just now'}">Just now</span>
                </div>

                <h3 th:text="${event.headline != null ? event.headline : 'Catalog update received'}">Catalog update
                    received</h3>
                <p th:text="${event.detailText != null ? event.detailText : 'No details supplied.'}">No details
                    supplied.</p>

                <div class="activity-meta">
                    <span>
                        <wa-icon name="radar"></wa-icon>
                        <strong th:text="${event.sourceLabel != null ? event.sourceLabel : 'Catalog Ops'}">Catalog Ops</strong>
                    </span>
                    <span th:if="${event.productLabel != null}">
                        <wa-icon name="box"></wa-icon>
                        <strong th:text="${event.productLabel}">Product</strong>
                    </span>
                    <span th:if="${event.variantLabel != null}">
                        <wa-icon name="swatchbook"></wa-icon>
                        <strong th:text="${event.variantLabel}">Variant</strong>
                    </span>
                </div>
            </div>
        </article>
    </div>

    <!--    <div class="empty-activity"-->
    <!--         th:if="${recentEvents == null or #lists.isEmpty(recentEvents)}"-->

</div>
